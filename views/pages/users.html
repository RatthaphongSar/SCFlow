<h2 class="mb-4" data-i18n="user_management_title">> User Management</h2>

<div class="grid-4 mb-4">
    <div class="card" style="grid-column: span 1;">
        <h3 data-i18n="create_user">Create User</h3>
        <form action="/users" method="POST">
            <div class="mb-2">
                <label data-i18n="username">Username</label>
                <input type="text" name="username" required style="width: 100%;">
            </div>
            <div class="mb-2">
                <label data-i18n="password">Password</label>
                <input type="password" name="password" required style="width: 100%;">
            </div>
            <div class="mb-2">
                <label data-i18n="role">Role</label>
                <select name="role" style="width: 100%;">
                    <option value="Member" data-i18n="role_member">Member</option>
                    <option value="ProjectAdmin" data-i18n="role_projectadmin">Project Admin</option>
                    <option value="Viewer" data-i18n="role_viewer">Viewer</option>
                    <option value="Master" data-i18n="role_master">Master</option>
                </select>
            </div>
            <div class="mb-2">
                <label data-i18n="email">Email</label>
                <input type="email" name="email" style="width: 100%;">
            </div>
            <button type="submit" class="btn btn-primary" data-i18n="create_user">Create User</button>
        </form>
    </div>

    <div class="card" style="grid-column: span 3;">
        <h3 data-i18n="all_users">All Users</h3>
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th data-i18n="id">ID</th>
                        <th data-i18n="username">Username</th>
                        <th data-i18n="role">Role</th>
                        <th data-i18n="email">Email</th>
                        <th data-i18n="created_at">Created At</th>
                        <th data-i18n="actions">Actions</th>
                    </tr>
                </thead>
                <tbody>
                    {{range .Users}}
                    <tr>
                        <td>#{{.ID}}</td>
                        <td>{{.Username}}</td>
                        <td><span class="badge" data-i18n="role_{{.Role | toLower}}">{{.Role}}</span></td>
                        <td>{{.Email}}</td>
                        <td>{{.CreatedAt.Format "2006-01-02"}}</td>
                        <td>
                            {{if ne .Role "Master"}}
                            <button class="btn" style="padding: 2px 6px; font-size: 0.8em; background-color: var(--danger-color);" 
                                    hx-delete="/users/{{.ID}}" 
                                    hx-confirm="Are you sure you want to delete this user?"
                                    hx-target="closest tr" 
                                    hx-swap="outerHTML"
                                    data-i18n="delete">
                                Delete
                            </button>
                            {{end}}
                        </td>
                    </tr>
                    {{else}}
                    <tr>
                        <td colspan="6" style="text-align: center; color: var(--text-muted);" data-i18n="no_users_found">No users found.</td>
                    </tr>
                    {{end}}
                </tbody>
            </table>
        </div>
    </div>
</div>
