<div style="display: flex; justify-content: center; align-items: center; height: 100vh;">
    <div class="card" style="width: 400px; padding: 40px;">
        <h2 style="text-align: center; margin-bottom: 20px; color: var(--primary-color);" data-i18n="login_title">SCFlow_ Login</h2>
        {{if .Error}}
        <div style="background-color: #ffebee; color: #c62828; padding: 10px; border-radius: 4px; margin-bottom: 20px; text-align: center;" data-i18n="error_invalid_credentials">
            {{.Error}}
        </div>
        {{end}}
        <form hx-post="/login" hx-target="body">
            <div class="mb-4">
                <label data-i18n="username">Username</label>
                <input type="text" name="username" required>
            </div>
            <div class="mb-4">
                <label data-i18n="password">Password</label>
                <input type="password" name="password" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%;" data-i18n="login_button">Login</button>
        </form>
    </div>
</div>
