<div class="card alert-modal" id="task-form-modal" style="position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 600px; max-height: 85vh; overflow-y: auto; box-shadow: 0 10px 40px rgba(0,0,0,0.6); border-radius: 12px;">
    <div class="alert-modal-header">
        <h3 style="margin: 0; flex: 1;">{{if .ParentID}}<span data-i18n="new_subtask">New Subtask</span> (Parent #{{.ParentID}}){{else}}<span data-i18n="new_task">New Task</span>{{end}}</h3>
        <button class="alert-modal-close" onclick="(function(){const m=document.querySelector('#modal-content .alert-modal');const o=document.querySelector('#modal-content .alert-modal-overlay');if(m)m.classList.remove('show');if(o)o.classList.remove('show');setTimeout(()=>document.getElementById('modal-content').innerHTML='',300);})()" aria-label="Close">&times;</button>
    </div>
    
    <div class="alert-modal-body">
        <form action="/tasks" method="POST" enctype="multipart/form-data">
            {{if .ParentID}}
            <input type="hidden" name="parent_id" value="{{.ParentID}}">
            {{end}}
            <div class="mb-4">
                <label data-i18n="title">Title</label>
                <input type="text" name="title" required placeholder="{{if .ParentID}}Subtask title...{{else}}Task title...{{end}}" data-i18n-placeholder="{{if .ParentID}}subtask_title_placeholder{{else}}task_title_placeholder{{end}}">
            </div>
            
            <div class="mb-4">
                <label data-i18n="description">Description</label>
                <textarea name="description" rows="3"></textarea>
            </div>
            
            <div class="grid-4 mb-4" style="grid-template-columns: 1fr 1fr;">
                <div>
                    <label data-i18n="start_date">Start Date & Time</label>
                    <input type="datetime-local" name="start_date">
                </div>
                <div>
                    <label data-i18n="due_date">Due Date & Time</label>
                    <input type="datetime-local" name="due_date">
                </div>
            </div>

            <div class="grid-4 mb-4" style="grid-template-columns: 1fr 1fr;">
                <div>
                    <label data-i18n="priority">Priority</label>
                    <select name="priority">
                        <option value="Low">Low</option>
                        <option value="Medium" selected>Medium</option>
                        <option value="High">High</option>
                        <option value="Critical">Critical</option>
                    </select>
                </div>
                <div>
                    <label data-i18n="assignee">Assignee</label>
                    <select name="assignee_id">
                        <option value="" data-i18n="unassigned">Unassigned</option>
                        {{range .Users}}
                        <option value="{{.ID}}">{{.Username}}</option>
                        {{end}}
                    </select>
                </div>
            </div>

            <div class="mb-4">
                <label data-i18n="status">Status</label>
                <select name="status">
                    <option value="Planning" data-i18n="status_planning" selected>Planning</option>
                    <option value="Correct" data-i18n="status_correct">Correct</option>
                    <option value="Test" data-i18n="status_test">Test</option>
                    <option value="Ready" data-i18n="status_ready">Ready</option>
                    <option value="Deploy" data-i18n="status_deploy">Deploy</option>
                    <option value="Done" data-i18n="status_done">Done</option>
                </select>
            </div>

            <div class="mb-4">
                <label data-i18n="attachment">Attachment</label>
                <input type="file" name="attachment">
            </div>
            
            <div class="alert-modal-footer">
                <button type="button" class="btn btn-secondary" onclick="(function(){var m=document.querySelector('#modal-content .alert-modal');var o=document.querySelector('#modal-content .alert-modal-overlay');if(m)m.classList.remove('show');if(o)o.classList.remove('show');setTimeout(function(){document.getElementById('modal-content').innerHTML='';},300);})()" data-i18n="cancel">Cancel</button>
                <button type="submit" class="btn btn-primary" data-i18n="create_task_btn">Create Task</button>
            </div>
        </form>
    </div>
</div>
<div class="alert-modal-overlay" onclick="(function(){const m=document.querySelector('#modal-content .alert-modal');const o=this;if(m)m.classList.remove('show');o.classList.remove('show');setTimeout(()=>document.getElementById('modal-content').innerHTML='',300);})()"></div>
